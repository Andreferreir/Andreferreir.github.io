<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digital Twin Experience</title>

<style>
:root{
  --bg:#060c18;
  --bg2:#0b1628;
  --accent:#1e88e5;
  --accent2:#42a5f5;
  --text:#e6edf3;
  --muted:#8aa0b8;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
  overflow-x:hidden;
}

/* HERO */
#hero{
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

#hero-canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
  opacity:.9;
}

.hero-inner{
  position:relative;
  z-index:2;
  max-width:800px;
  padding:2rem;
}

.hero-inner h1{
  font-size:clamp(2rem,4vw,3.5rem);
  margin-bottom:1rem;
}

.hero-inner p{
  font-size:1.2rem;
  color:var(--muted);
}

/* KNOWLEDGE */
#knowledge{
  padding:6rem 2rem;
  max-width:1200px;
  margin:auto;
}

#knowledge h2{
  text-align:center;
  margin-bottom:3rem;
  font-size:2.2rem;
}

.knowledge-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:2rem;
}

.knowledge-card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  padding:2rem;
  border-radius:16px;
  position:relative;
  transition:.3s ease;
}

.knowledge-card:hover{
  transform:translateY(-6px);
  border-color:rgba(66,165,245,0.3);
}

.knowledge-card h3{
  margin-bottom:1rem;
}

.knowledge-card p{
  color:var(--muted);
}

/* PREVIEW */
.diagram-preview{
  position:absolute;
  top:0;
  right:0;
  width:300px;
  height:200px;
  background:rgba(10,20,40,.95);
  border-radius:12px;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
  transform:translate(40%, -40%) scale(.9);
  opacity:0;
  transition:.3s ease;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.knowledge-card:hover .diagram-preview{
  opacity:1;
  transform:translate(40%, -40%) scale(1);
}

.diagram-preview img{
  width:100%;
  height:100%;
  object-fit:contain;
  cursor:grab;
  user-select:none;
}

@media (prefers-reduced-motion: reduce){
  #hero-canvas{display:none;}
}
</style>
</head>
<body>

<section id="hero">
  <canvas id="hero-canvas"></canvas>
  <div class="hero-inner">
    <h1>Digital Twin Intelligence</h1>
    <p>Conectando dados, sistemas e conhecimento em tempo real.</p>
  </div>
</section>

<section id="knowledge">
  <h2>Knowledge</h2>

  <div class="knowledge-grid">

    <div class="knowledge-card" data-diagram="https://upload.wikimedia.org/wikipedia/commons/3/3b/Flowchart_example.svg">
      <h3>System Architecture</h3>
      <p>Visualização interativa da arquitetura do sistema.</p>
      <div class="diagram-preview"></div>
    </div>

    <div class="knowledge-card" data-diagram="https://upload.wikimedia.org/wikipedia/commons/8/8e/Basic_Block_Diagram.svg">
      <h3>Process Flow</h3>
      <p>Fluxos operacionais com preview interativo.</p>
      <div class="diagram-preview"></div>
    </div>

  </div>
</section>

<script>
/* PARTICLE DIGITAL TWIN */
const canvas=document.getElementById("hero-canvas");
const ctx=canvas.getContext("2d");
let w,h,particles=[];
const maxDist=130;

function resize(){
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

class Particle{
  constructor(){
    this.x=Math.random()*w;
    this.y=Math.random()*h;
    this.vx=(Math.random()-.5)*.7;
    this.vy=(Math.random()-.5)*.7;
  }
  move(){
    this.x+=this.vx;
    this.y+=this.vy;
    if(this.x<0||this.x>w) this.vx*=-1;
    if(this.y<0||this.y>h) this.vy*=-1;
  }
}

function initParticles(){
  particles=[];
  let count=Math.min(120,Math.floor((w*h)/9000));
  for(let i=0;i<count;i++) particles.push(new Particle());
}
initParticles();

function animate(){
  ctx.clearRect(0,0,w,h);

  for(let p of particles){
    p.move();
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="rgba(66,165,245,.8)";
    ctx.fill();
  }

  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      let dx=particles[i].x-particles[j].x;
      let dy=particles[i].y-particles[j].y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<maxDist){
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle="rgba(30,136,229,"+(1-dist/maxDist)*.15+")";
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(animate);
}
animate();

/* KNOWLEDGE PREVIEW + PAN/ZOOM */
document.querySelectorAll(".knowledge-card").forEach(card=>{
  const preview=card.querySelector(".diagram-preview");
  const src=card.dataset.diagram;
  let img=document.createElement("img");
  img.src=src;
  preview.appendChild(img);

  let scale=1, pos={x:0,y:0}, dragging=false, start={x:0,y:0};

  img.addEventListener("wheel",e=>{
    e.preventDefault();
    scale*=e.deltaY<0?1.1:.9;
    scale=Math.min(Math.max(.6,scale),4);
    img.style.transform=`translate(${pos.x}px,${pos.y}px) scale(${scale})`;
  });

  img.addEventListener("pointerdown",e=>{
    dragging=true;
    start.x=e.clientX;
    start.y=e.clientY;
  });

  window.addEventListener("pointermove",e=>{
    if(!dragging) return;
    pos.x+=e.clientX-start.x;
    pos.y+=e.clientY-start.y;
    start.x=e.clientX;
    start.y=e.clientY;
    img.style.transform=`translate(${pos.x}px,${pos.y}px) scale(${scale})`;
  });

  window.addEventListener("pointerup",()=>dragging=false);
});
</script>

</body>
</html>
